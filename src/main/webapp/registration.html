<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register - FoodieGo</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background: linear-gradient(rgba(0,0,0,.75),
    rgba(0,0,0,.75)),
    url("images/hero-food.png");
    background-size: cover;
    background-position: center;
}

.form-box{
    width:500px;
    backdrop-filter: blur(10px);
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:20px;
    font-size:14px;
}

.logo-text{
    text-align:center;
    color:#ff6b35;
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#ff6b35;
    text-decoration:none;
    font-weight:600;
}

textarea{
    resize:none;
    height:80px;
}

</style>

</head>

<body>

<div class="form-container">

    <div class="form-box">

        <div class="logo-text">
            FoodieGo
        </div>

        <h2>Create Account</h2>

        <p class="subtitle">
            Join FoodieGo and discover amazing food near you
        </p>

        <form action="RegisterServlet" method="post">

            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

            <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

            <textarea
            name="address"
            placeholder="Address"
            required></textarea>

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

            <input
            type="password"
            name="confirmPassword"
            placeholder="Confirm Password"
            required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="login.jsp">
                Login Here
            </a>

        </div>

    </div>

</div>

</body>
</html>
